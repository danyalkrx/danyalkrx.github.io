<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Triple Crown — Releases</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="icon" type="image/png" href="/artists/logo.png">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#040404;
  color:rgba(255,255,255,0.92);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.03;
  pointer-events:none;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.brand img{ width:54px; }

.brand-text{ transition:0.2s ease; }

.brand-text h1{
  font-size:0.9rem;
  letter-spacing:0.34em;
  text-transform:uppercase;
  font-weight:900;
}

.brand-text p{
  font-size:0.62rem;
  opacity:0.5;
  letter-spacing:0.2em;
  text-transform:uppercase;
}

.nav-links{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:28px;
  flex:1;
}

.nav-item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 16px;
  border-radius:16px;
  text-decoration:none;
  color:rgba(255,255,255,0.75);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.12em;
  font-size:0.75rem;
}

.nav-item:hover,
.nav-item.active{
  background:rgba(255,255,255,0.05);
  color:white;
}

.nav-icon{ min-width:24px; display:flex; justify-content:center; }

.nav-label{ transition:0.2s ease; }

.collapse-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  color:white;
  cursor:pointer;
  margin-top:auto;
}

/* MAIN */

.main{
  margin-left:270px;
  padding:42px;
  transition:0.3s ease;
}

.main.expanded{ margin-left:96px; }

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:38px;
}

.title h2{
  font-size:2.6rem;
  font-weight:900;
}

.title p{
  font-size:0.75rem;
  opacity:0.5;
  text-transform:uppercase;
  letter-spacing:0.14em;
  margin-top:8px;
}

.new-btn{
  background:white;
  color:black;
  border:none;
  padding:18px 28px;
  font-size:0.85rem;
  border-radius:18px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:0.14em;
  cursor:pointer;
  transition:0.22s ease;
}

.new-btn:hover{
  transform:translateY(-3px);
  background:rgba(255,255,255,0.9);
}

/* GRID */

.release-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:22px;
}

/* CARD */

.release{
  position:relative;
  border-radius:26px;
  overflow:hidden;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  transition:0.25s ease;
  cursor:pointer;
}

.release img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  display:block;
  position:relative;
  z-index:1;
}

/* BLUR LAYER */

.release::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:0%;
  backdrop-filter: blur(14px);
  background: rgba(0,0,0,0.25);
  transition:0.28s ease;
  z-index:2;
  pointer-events: none;
}

.release:hover::after{
  height:30%;
}

.release:hover{
  transform:translateY(-6px);
}

/* OVERLAY */

.overlay{
  position:absolute;
  inset:0;
  z-index:5;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:18px;
  gap:14px;
}

.overlay-info{
  display:flex;
  justify-content:space-between;
  align-items:flex-start; /* important: keeps both pinned to top */
  font-size:0.72rem;
  letter-spacing:0.18em;
  text-transform:uppercase;
  opacity:0.9;
  margin-bottom:14px;
  width:100%;
}

/* LEFT (artist) */
.overlay-info > span{
  align-self:flex-start;
}

/* RIGHT block (year + links) */
.right-meta{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:8px;
}


/* SMART LINKS */

.smart-links{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  opacity:0;
  transform:translateY(6px);
  transition:0.25s ease;
  justify-content:flex-end;
}

.release:hover .smart-links{
  opacity:1;
  transform:translateY(0);
}

.smart-links a{
  font-size:0.65rem;
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.08);
  padding:8px 10px;
  border-radius:10px;
  letter-spacing:0.12em;
  text-transform:uppercase;
}

.smart-links a:hover{
  background:rgba(255,255,255,0.18);
}

/* INFO */

/* INFO */

.info{
  padding:28px 18px 22px 18px;
  display:flex;
  flex-direction:column;
  gap:8px;
  min-height:90px; /* key: forces consistent card height */
  justify-content:flex-start;
  position:relative;
  z-index:4;
  background:rgba(0,0,0,0.0);
}

.info strong{
  display:block;
  font-size:1rem;
}

.info span{
  font-size:0.7rem;
  opacity:0.45;
  text-transform:uppercase;
  letter-spacing:0.12em;
}

/* MOBILE */

@media(max-width:900px){

  .main{
    margin-left:0;
    padding:22px;
  }

  .release-grid{
    grid-template-columns:1fr;
  }

  .smart-links{
    opacity:1;
    transform:none;
  }

  .topbar{
    gap:14px;
    align-items:flex-start;
  }

.new-btn{
  padding:12px 14px;
  font-size:0.68rem;
  border-radius:14px;
  letter-spacing:0.1em;
  width:92px;
  line-height:1.2;
  text-align:center;
  white-space:normal;
}

}

</style>
</head>

<body>

<div id="sidebar-container"></div>

<main class="main" id="main">

  <div class="topbar">

    <div class="title">
      <h2>Releases</h2>
      <p>Your full catalog</p>
    </div>

    <a href="newrelease.html">
      <button class="new-btn">+ New Release</button>
    </a>

  </div>

  <section class="release-grid">

    <div class="release">
      <img src="/artists/takecare.jpg">

      <div class="overlay">

        <div class="overlay-info">
          <span>Drake</span>

          <div class="right-meta">
            <span>2026</span>
            <div class="smart-links">
              <a href="smartlinktcmg.html">Smart Link</a>
            </div>
          </div>
        </div>

      </div>

      <div class="info">
        <strong>Take Care</strong>
        <span>Single</span>
      </div>
    </div>

    <div class="release">
      <img src="/artists/habibti.jpg">

      <div class="overlay">

        <div class="overlay-info">
          <span>Drake</span>

          <div class="right-meta">
            <span>2026</span>
            <div class="smart-links">
              <a href="smartlinktcmg.html">Smart Link</a>
            </div>
          </div>
        </div>

      </div>

      <div class="info">
        <strong>Habibti</strong>
        <span>Single</span>
      </div>
    </div>

    <div class="release">
      <img src="/artists/iceman.jpeg">

      <div class="overlay">

        <div class="overlay-info">
          <span>Drake</span>

          <div class="right-meta">
            <span>2025</span>
            <div class="smart-links">
              <a href="smartlinktcmg.html">Smart Link</a>
            </div>
          </div>
        </div>

      </div>

      <div class="info">
        <strong>Iceman</strong>
        <span>EP</span>
      </div>
    </div>

  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script src="/artists/dashboard.js"></script>

</body>
</html>
