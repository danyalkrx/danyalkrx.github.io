<!-- sidebar.html -->
<style>
/* =========================
   SIDEBAR (SELF-CONTAINED)
========================= */

.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:270px;
  height:100vh;

  border-right:1px solid rgba(255,255,255,0.06);
  background:rgba(7,7,7,0.75);
  backdrop-filter:blur(20px);

  padding:28px 18px;

  display:flex;
  flex-direction:column;

  z-index:100;
  transition:0.3s ease;
}

.sidebar.collapsed{
  width:96px;
}

/* BRAND */
.sidebar-top{
  display:flex;
  flex-direction:column;
  gap:22px;
}

.brand{
  display:flex;
  align-items:center;
  gap:16px;
}

.brand img{
  width:56px;
  min-width:56px;
}

.brand-text{
  transition:0.2s ease;
}

.brand-text h1{
  font-size:0.9rem;
  letter-spacing:0.34em;
  text-transform:uppercase;
  font-weight:900;
}

.brand-text p{
  font-size:0.62rem;
  opacity:0.5;
  letter-spacing:0.2em;
  text-transform:uppercase;
}

/* COLLAPSED */
.sidebar.collapsed .brand{
  justify-content:center;
}

.sidebar.collapsed .brand-text{
  opacity:0;
  width:0;
  overflow:hidden;
}

/* NAV */
.nav-links{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:28px;
  flex:1;
}

.nav-item{
  text-decoration:none;
  color:rgba(255,255,255,0.72);

  padding:15px 16px;
  border-radius:18px;

  transition:0.22s ease;
  border:1px solid transparent;

  font-weight:700;

  display:flex;
  align-items:center;
  gap:16px;
}

.nav-item:hover,
.nav-item.active{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  color:white;
}

.nav-icon{
  min-width:24px;
  display:flex;
  justify-content:center;
}

/* LABEL COLLAPSE */
.nav-label{
  font-size:0.78rem;
  letter-spacing:0.14em;
  text-transform:uppercase;
  white-space:nowrap;
  transition:0.2s ease;
}

.sidebar.collapsed .nav-label{
  opacity:0;
  width:0;
  overflow:hidden;
}

/* BUTTON */
.collapse-btn{
  width:42px;
  height:42px;

  border:none;
  border-radius:14px;

  background:rgba(255,255,255,0.05);
  color:white;

  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  margin-top:auto;
}

.collapse-btn:hover{
  background:white;
  color:black;
}

/* MOBILE */
@media(max-width:1100px){
  .sidebar{
    transform:translateX(-100%);
    z-index:1000;
  }

  .sidebar.open{
    transform:translateX(0);
  }

  .sidebar.collapsed{
    width:270px;
  }
}

@media (max-width: 1100px) {
  .collapse-btn {
    opacity: 0;
    pointer-events: none;
    height: 0;
    margin: 0;
    padding: 0;
  }
}

    /* =========================
   MOBILE SIDEBAR FIX
========================= */

.mobile-toggle{
  display:none;
  position:fixed;
  bottom:18px;
  right:18px;
  z-index:2000;

  width:56px;
  height:56px;

  border-radius:18px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(10,10,10,0.85);
  backdrop-filter:blur(14px);

  color:white;
  font-size:22px;
  cursor:pointer;

  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:999;

  opacity:0;
  pointer-events:none;
  transition:0.25s ease;
}

/* sidebar mobile behavior */
@media (max-width:1100px){

  .mobile-toggle{
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .sidebar{
    transform:translateX(-100%);
    transition:0.3s ease;
    z-index:1000;
  }

  .sidebar.open{
    transform:translateX(0);
  }

  .overlay.active{
    opacity:1;
    pointer-events:auto;
  }

  /* kill desktop collapse behavior on mobile */
  .sidebar.collapsed{
    width:270px;
  }
}


</style>

<aside class="sidebar" id="sidebar">

  <div class="sidebar-top">
    <div class="brand">
      <img src="/artists/logo-transparent.png">
      <div class="brand-text">
        <h1>Triple Crown</h1>
        <p>Media Group</p>
      </div>
    </div>
  </div>

  <nav class="nav-links">
    <a class="nav-item active" href="dashboardtcmg.html">
      <span class="nav-icon">⌂</span>
      <span class="nav-label">Dashboard</span>
    </a>

    <a class="nav-item" href="releasestcmg.html">
      <span class="nav-icon">♫</span>
      <span class="nav-label">Releases</span>
    </a>
  </nav>

  <button class="collapse-btn" id="collapseBtn">☰</button>

</aside>
