<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Take Care — Drake | Triple Crown Smart Link</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="icon" type="image/png" href="/artists/logo.png">

<meta property="og:title" content="Take Care — Drake">
<meta property="og:description" content="Stream Take Care on all platforms.">
<meta property="og:image" content="/artists/takecare.jpg">
<meta property="og:type" content="music.song">

<style>

/* RESET + MOBILE FIX */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  color: rgba(255,255,255,0.94);
  overflow-x: hidden;
  background: #040404;
}

html, body {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

/* FIXED BACKGROUND LAYER (NO OVERFLOW) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(90,90,255,0.12), transparent 35%),
    radial-gradient(circle at bottom right, rgba(255,255,255,0.06), transparent 45%),
    url("https://grainy-gradients.vercel.app/noise.svg");
  opacity: 0.08;
  pointer-events: none;
  z-index: -3;
}

/* MAIN GLOW */
.background-glow {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: -2;
  pointer-events: none;

  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,0.05), transparent 45%),
    radial-gradient(circle at 80% 80%, rgba(80,110,255,0.10), transparent 55%);

  filter: blur(50px);
  transform: scale(1.15); /* KEY FIX: prevents edge clipping WITHOUT overflow */
}

/* HEADER */
header {
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(14px);
  background: rgba(5,4,4,0.82);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.container {
  width: 100%;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 28px;
}

.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 16px;
  text-decoration: none;
  color: white;
}

.brand img {
  width: 70px;
  opacity: 0.95;
}

.brand-text h1 {
  font-size: 0.95rem;
  font-weight: 900;
  letter-spacing: 0.35em;
  text-transform: uppercase;
}

.brand-text p {
  font-size: 0.65rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  opacity: 0.45;
  margin-top: 4px;
}

.home-btn {
  text-decoration: none;
  color: white;
  border: 1px solid rgba(255,255,255,0.12);
  padding: 12px 20px;
  border-radius: 999px;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  transition: 0.25s ease;
  font-weight: 700;
}

.home-btn:hover {
  background: white;
  color: black;
}

/* HERO */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 140px 0 80px;
}

.hero-grid {
  display: grid;
  grid-template-columns: 520px 1fr;
  gap: 90px;
  align-items: center;
}

/* COVER */
.cover-wrapper {
  position: relative;
}

.cover-glow {
  position: absolute;
  inset: -80px;
  background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
  filter: blur(70px);
  z-index: -1;
}

.cover-art {
  width: 100%;
  border-radius: 32px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 20px 60px rgba(0,0,0,0.65),
    0 0 0 1px rgba(255,255,255,0.02);
}

.cover-art img {
  width: 100%;
  display: block;
}

/* INFO */
.artist {
  font-size: 1rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  opacity: 0.5;
  margin-bottom: 18px;
  font-weight: 700;
}

.title {
  font-size: clamp(4rem, 9vw, 7rem);
  line-height: 0.9;
  text-transform: uppercase;
  font-weight: 900;
  letter-spacing: -0.04em;
  margin-bottom: 26px;
  color: rgba(245,245,245,0.92);
}

.description {
  max-width: 620px;
  line-height: 1.9;
  font-size: 1.05rem;
  color: rgba(255,255,255,0.62);
  margin-bottom: 42px;
}

/* PLATFORMS */
.platforms {
  display: grid;
  grid-template-columns: repeat(2, minmax(180px,1fr));
  gap: 18px;
  max-width: 520px;
}

.platform-btn {
  text-decoration: none;
  color: white;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  padding: 18px 22px;
  border-radius: 24px;
  display: flex;
  justify-content: space-between;
  transition: 0.25s ease;
  backdrop-filter: blur(10px);
}

.platform-btn:hover {
  transform: translateY(-4px);
  background: white;
  color: black;
}

/* FOOTER */
footer {
  padding: 34px;
  border-top: 1px solid rgba(255,255,255,0.06);
  text-align: center;
  color: rgba(255,255,255,0.38);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.22em;
}

/* MOBILE */
@media (max-width: 980px) {

  header { display: none; }

  .hero {
    padding: 40px 0 70px;
    min-height: auto;
  }

  .hero-grid {
    grid-template-columns: 1fr;
    gap: 42px;
    text-align: center;
  }

  .cover-art {
    width: 92vw;
    margin: 0 auto;
  }

  .cover-glow {
    inset: -120px;
    filter: blur(90px);
  }

  .title {
    font-size: 4.2rem;
  }

  .platforms {
    grid-template-columns: 1fr;
    max-width: 92vw;
    margin: 0 auto;
  }
}

</style>
</head>

<body>

<div class="background-glow"></div>

<header>
  <div class="container nav">
    <a class="brand" href="testtcmg.html">
      <img src="/artists/logo-transparent.png" alt="Triple Crown">
      <div class="brand-text">
        <h1>Triple Crown</h1>
        <p>Media Group</p>
      </div>
    </a>

    <a class="home-btn" href="logintcmg.html">
      Artist Login
    </a>
  </div>
</header>

<section class="hero">
  <div class="container hero-grid">

    <div class="cover-wrapper">
      <div class="cover-glow"></div>
      <div class="cover-art">
        <img src="/artists/takecare.jpg" alt="Take Care Cover Art">
      </div>
    </div>

    <div>
      <div class="artist">Drake</div>

      <h1 class="title">Take Care</h1>

      <p class="description">
        Stream “Take Care” now on all major platforms.
      </p>

      <div class="platforms">
        <a class="platform-btn" href="#">Spotify</a>
        <a class="platform-btn" href="#">Apple Music</a>
        <a class="platform-btn" href="#">YouTube Music</a>
        <a class="platform-btn" href="#">SoundCloud</a>
      </div>
    </div>

  </div>
</section>

<footer>
  © 2026 Triple Crown Media Group
</footer>

</body>
</html>
