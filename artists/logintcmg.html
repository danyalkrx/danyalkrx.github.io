<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artist Login | Triple Crown Media Group</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="icon" type="image/png" href="/artists/logo.png">
<link rel="apple-touch-icon" href="/artists/logo.png">

<style>

/* ---------------- BASE ---------------- */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(circle at 50% 30%, #0b0a09 0%, #050404 55%, #020202 100%);
  color: rgba(255,255,255,0.92);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity: 0.04;
  pointer-events: none;
}

/* ---------------- BACKGROUND ---------------- */

.background-glow {
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,0.03), transparent 60%),
    radial-gradient(circle at 70% 80%, rgba(120,140,255,0.02), transparent 65%),
    linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.85));
}

/* ---------------- HEADER ---------------- */

header {
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(14px);
  background: rgba(5,4,4,0.82);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.container {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 0;
}

/* BRAND */
.brand {
  display: flex;
  align-items: center;
  gap: 18px;
  text-decoration: none;
  color: inherit;
}

.brand img {
  width: 80px;
  opacity: 0.95;
}

.brand-text h1 {
  font-size: 1rem;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  font-weight: 900;
}

.brand-text p {
  margin-top: 4px;
  color: rgba(255,255,255,0.42);
  text-transform: uppercase;
  letter-spacing: 0.26em;
  font-size: 0.68rem;
}

/* LOGIN BUTTON */
    .nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
}

.nav-links a {
  text-decoration: none;
  color: rgba(255,255,255,0.65);
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  transition: 0.2s ease;
  position: relative;
}

.nav-links a:hover {
  color: rgba(255,255,255,0.95);
}

.nav-links a.active {
  color: white;
}

.nav-links a.active::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -8px;
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.6);
}

    .login-btn {
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.95);
  padding: 12px 20px;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  font-size: 0.72rem;
  font-weight: 800;
  transition: all 0.25s ease;

  display: inline-flex;
  align-items: center;
  justify-content: center;

  box-shadow: 0 0 0 rgba(255,255,255,0);
  margin-left: 18px;
}

.login-btn:hover {
  background: #ffffff;
  color: #000000 !important;
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(255,255,255,0.12);
}

/* ---------------- LOGIN LAYOUT ---------------- */

.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 120px;
}

.login-card {
  width: 100%;
  max-width: 420px;
  padding: 38px;

  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(10,8,7,0.55);
  backdrop-filter: blur(18px);

  box-shadow:
    0 20px 80px rgba(0,0,0,0.6),
    inset 0 0 0 1px rgba(255,255,255,0.02);
}

.login-title {
  text-transform: uppercase;
  letter-spacing: 0.35em;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.5);
  margin-bottom: 24px;
  text-align: center;
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 14px;

  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);

  color: rgba(255,255,255,0.9);

  outline: none;
  font-size: 0.95rem;
}

input:focus {
  border-color: rgba(255,255,255,0.25);
}

button {
  width: 100%;
  margin-top: 10px;

  padding: 14px;

  border-radius: 999px;

  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);

  color: white;

  text-transform: uppercase;
  letter-spacing: 0.25em;

  font-weight: 800;
  font-size: 0.75rem;

  cursor: pointer;
  transition: 0.25s ease;
}

button:hover {
  background: white;
  color: black;
}

.note {
  margin-top: 16px;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  text-align: center;
}

/* ---------------- MOBILE ---------------- */

@media (max-width: 980px) {

  .brand img {
    width: 55px;
  }

  .brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.05;
  }

  .brand-text h1 {
    font-size: 0.85rem;
    letter-spacing: 0.28em;
  }

  .brand-text p {
    font-size: 0.55rem;
    letter-spacing: 0.22em;
    opacity: 0.6;
    margin-top: 3px;
  }

  .login-btn {
    padding: 10px 16px;
    font-size: 0.65rem;
  }

  .login-card {
    padding: 28px;
  }
}

</style>
</head>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const form = document.getElementById("loginForm");

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    const username = document.querySelector('input[type="text"]').value;
    const password = document.querySelector('input[type="password"]').value;

    if (username === "test" && password === "test") {
      window.location.href = "dashboardtcmg.html";
    } else {
      alert("Invalid credentials");
    }
  });
});
</script>

<body>

<div class="background-glow"></div>

<div id="header-placeholder"></div>


<div class="login-wrap">

  <div class="login-card">

    <div class="login-title">Artist Access</div>

    <form id="loginForm">
      <input type="text" placeholder="Username" />
      <input type="password" placeholder="Password" />
      <button type="submit">Login</button>
    </form>

    <div class="note">
      Triple Crown Media Group
    </div>

  </div>

</div>

<script>
fetch("header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header-placeholder").innerHTML = data;

    // initialize mobile menu AFTER header loads
    const menuToggle = document.getElementById("menuToggle");
    const sidebar = document.getElementById("mobileSidebar");
    const overlay = document.getElementById("mobileOverlay");

    if (menuToggle) {
      menuToggle.addEventListener("click", () => {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      });
    }

    if (overlay) {
      overlay.addEventListener("click", () => {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      });
    }

    // highlight current page nav item
    const currentPage = window.location.pathname.split("/").pop();

    document.querySelectorAll(".nav-links a, .mobile-sidebar a").forEach(link => {
      const href = link.getAttribute("href");

      if (href === currentPage) {
        link.classList.add("active");
      }
    });
  })
  .catch(error => console.error("Header failed to load:", error));
</script>

</body>
</html>
